app = "slicefx-shortlink-web"
primary_region = "nrt"

[build]
  dockerfile = "src/ShortLink.Web/Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
