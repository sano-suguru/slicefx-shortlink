server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM SPA fallback: deep links that don't match a static file serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Correct MIME types for Blazor assets.
    types {
        text/html                               html htm;
        text/css                                css;
        application/javascript                  js;
        application/wasm                        wasm;
        application/octet-stream                dll dat blat;
        font/woff2                              woff2;
        font/woff                               woff;
        image/svg+xml                           svg svgz;
        image/png                               png;
        image/jpeg                              jpg jpeg;
        image/gif                               gif;
        image/x-icon                            ico;
        application/json                        json;
    }

    # Serve pre-compressed Brotli and gzip files when available.
    location ~* \.(js|wasm|css|dat|blat)$ {
        gzip_static on;
        add_header Vary Accept-Encoding;
    }

    # Cache static _framework assets (fingerprinted) for a long time.
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip_static on;
    }

    # No caching for index.html — must always be fresh to pick up new fingerprinted URLs.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
