app = "slicefx-shortlink"
primary_region = "nrt"

[build]
  dockerfile = "src/ShortLink.Api/Dockerfile"
  [build.args]
    TARGETPLATFORM = "linux/amd64"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[http_service.checks]]
  method = "GET"
  path = "/health/ready"
  interval = "15s"
  timeout = "5s"
  grace_period = "30s"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  # Set at deploy time (fly secrets set):
  #   DATABASE_URL         (Neon postgres:// URI — Db.cs normalizes to Npgsql keyword format + SslMode=Require)
  #   SeedApiKey           (admin API key; generate with: openssl rand -hex 32)
  #   BaseUrl              (e.g. https://slicefx-shortlink.fly.dev — must match public hostname)
